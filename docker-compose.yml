version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenicare-app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/storage
    networks:
      - jenicare-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=jenicare
      - DB_USERNAME=jenicare
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis

  nginx:
    image: nginx:alpine
    container_name: jenicare-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - jenicare-network
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenicare-queue
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - ./storage:/var/www/storage
    networks:
      - jenicare-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - QUEUE_CONNECTION=redis
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_DATABASE=jenicare
      - DB_USERNAME=jenicare
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenicare-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./storage:/var/www/storage
    networks:
      - jenicare-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - QUEUE_CONNECTION=redis
      - DB_CONNECTION=pgsql
      - DB_DATABASE=jenicare
      - DB_USERNAME=jenicare
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: jenicare-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - jenicare-network

  redis:
    image: redis:7-alpine
    container_name: jenicare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - jenicare-network

  db:
    image: postgres:16-alpine
    container_name: jenicare-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=jenicare
      - POSTGRES_USER=jenicare
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jenicare-network

volumes:
  postgres_data:

networks:
  jenicare-network:
    driver: bridge
