name: Code Quality & Security Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-quality:
    name: PHP Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, zip
          tools: composer:v2, cs2pr

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-qa-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-qa-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
        working-directory: backend

      - name: PHP CS Fixer
        run: |
          vendor/bin/php-cs-fixer fix \
            --dry-run \
            --diff \
            --format=checkstyle \
            --rules=@PSR12 \
            backend/app backend/config backend/database backend/routes backend/tests 2>&1 | cs2pr || true
        continue-on-error: true

      - name: Larastan / PHPStan Static Analysis
        run: vendor/bin/phpstan analyse --memory-limit=512M --error-format=github
        working-directory: backend
        continue-on-error: true

      - name: Composer Security Audit
        run: composer audit --format=json > composer-audit.json
        working-directory: backend
        continue-on-error: true

      - name: Upload Composer Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: composer-audit
          path: backend/composer-audit.json
          retention-days: 7

  js-quality:
    name: JavaScript Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: admin-panel

      - name: Run ESLint
        run: npx eslint 'src/**/*.{js,vue}' --format stylish
        working-directory: admin-panel
        continue-on-error: true

      - name: npm Security Audit
        run: npm audit --audit-level=high --json > npm-audit.json
        working-directory: admin-panel
        continue-on-error: true

      - name: Upload npm Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit
          path: admin-panel/npm-audit.json
          retention-days: 7

  android-quality:
    name: Android Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: android-app
          cache-read-only: true

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck
        working-directory: android-app
        continue-on-error: true

      - name: Run detekt
        run: ./gradlew detekt
        working-directory: android-app
        continue-on-error: true

  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [php-quality, js-quality, android-quality]
    if: always()

    steps:
      - name: Collect job status
        run: |
          echo "## Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PHP Quality | ${{ needs.php-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JS Quality | ${{ needs.js-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android Quality | ${{ needs.android-quality.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail on critical issues
        if: |
          needs.php-quality.result == 'failure' ||
          needs.js-quality.result == 'failure'
        run: |
          echo "Critical quality issues detected. Review the reports above."
          exit 1
