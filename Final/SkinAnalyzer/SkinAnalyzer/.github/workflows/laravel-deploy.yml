name: Laravel Deploy to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/laravel-deploy.yml'

concurrency:
  group: hostinger-deploy
  cancel-in-progress: false

env:
  PHP_VERSION: '8.2'
  COMPOSER_CACHE_KEY: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}

jobs:
  test:
    name: PHP Tests & Static Analysis
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: skin_analyzer_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, zip, bcmath, gd, exif, curl, redis
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ env.COMPOSER_CACHE_KEY }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: |
          composer install \
            --no-interaction \
            --no-progress \
            --prefer-dist \
            --optimize-autoloader
        working-directory: backend

      - name: Create .env file
        run: |
          cp .env.example .env
          php artisan key:generate
        working-directory: backend

      - name: Run PHPUnit tests
        run: php artisan test --parallel --coverage-clover=coverage.xml
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skin_analyzer_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run Larastan (PHPStan)
        run: ./vendor/bin/phpstan analyse --memory-limit=512M
        working-directory: backend

      - name: Run Pint (Lint check)
        run: ./vendor/bin/pint --test
        working-directory: backend

  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, zip, bcmath, gd, exif, curl, redis
          tools: composer:v2

      - name: Install Composer dependencies (production)
        run: |
          composer install \
            --no-interaction \
            --no-progress \
            --prefer-dist \
            --optimize-autoloader \
            --no-dev
        working-directory: backend

      - name: Prepare deployment archive
        run: |
          cd backend
          rm -rf .env .git tests/ storage/logs/*.log bootstrap/cache/*
          tar -czf ../deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='phpunit.xml' \
            --exclude='phpstan.neon' \
            --exclude='.editorconfig' \
            .

      - name: Deploy via lftp to Hostinger
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_PASS: ${{ secrets.HOSTINGER_PASS }}
          HOSTINGER_PATH: ${{ secrets.HOSTINGER_PATH }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -e "
            set ftp:ssl-allow yes;
            set ftp:ssl-protect-data yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            open $HOSTINGER_HOST;
            user $HOSTINGER_USER '$HOSTINGER_PASS';
            lcd ./;
            cd $HOSTINGER_PATH;
            mirror --reverse --verbose --delete --exclude storage/ --exclude .env --exclude public/storage/ ./ backend/;
            bye;
          "

      - name: Run post-deployment commands
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_PASS: ${{ secrets.HOSTINGER_PASS }}
        run: |
          sshpass -p "$HOSTINGER_PASS" ssh -o StrictHostKeyChecking=no \
            "$HOSTINGER_USER@$HOSTINGER_HOST" \
            "cd $HOSTINGER_PATH && \
             php artisan storage:link && \
             php artisan migrate --force && \
             php artisan config:cache && \
             php artisan route:cache && \
             php artisan view:cache && \
             php artisan queue:restart" || true
