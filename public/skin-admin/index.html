<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="لوحة تحكم SkinAnalyzer - منصة تحليل البشرة بالذكاء الاصطناعي" />
  <meta name="theme-color" content="#1a8870" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SkinAnalyzer | لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }
    body {
      font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #f0f2f5;
      color: #1e293b;
      overflow-x: hidden;
    }
    #app {
      min-height: 100vh;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    ul, ol {
      list-style: none;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    button {
      cursor: pointer;
      border: none;
      outline: none;
      font-family: inherit;
    }
    input, textarea, select {
      font-family: inherit;
      outline: none;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #c1c9d2;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #a0aab4;
    }
    .app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f0f2f5;
    }
    .app-loading .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #1a8870;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script type="module" crossorigin src="/skin-admin/assets/index-C2VpB_j6.js"></script>
  <link rel="stylesheet" crossorigin href="/skin-admin/assets/index-BWzxQJL9.css">
</head>
<body>
  <div id="app">
    <div class="app-loading">
      <div class="spinner"></div>
    </div>
  </div>
</body>
</html>
